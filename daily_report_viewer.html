<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>일간 경제 동향 리포트</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121a31;
      --panel-2: #18213d;
      --text: #eef2ff;
      --muted: #aab4d6;
      --line: rgba(255,255,255,0.08);
      --accent: #6ea8fe;
      --accent-2: #9b8cff;
      --good: #69db7c;
      --warn: #ffd166;
      --shadow: 0 10px 30px rgba(0,0,0,0.25);
      --radius: 22px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(110,168,254,0.16), transparent 25%),
        radial-gradient(circle at top right, rgba(155,140,255,0.14), transparent 20%),
        linear-gradient(180deg, #09101f 0%, #0d1430 100%);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 28px;
    }

    .hero {
      background: linear-gradient(135deg, rgba(110,168,254,0.16), rgba(155,140,255,0.12));
      border: 1px solid var(--line);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(255,255,255,0.06);
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 4vw, 46px);
      line-height: 1.08;
      letter-spacing: -0.03em;
    }

    .subtitle {
      margin-top: 12px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
      max-width: 850px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-top: 22px;
    }

    .button, label.file-button {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      text-decoration: none;
      transition: 0.2s ease;
    }

    .button:hover, label.file-button:hover {
      transform: translateY(-1px);
      background: var(--panel-2);
    }

    input[type="file"] { display: none; }

    .grid {
      display: grid;
      grid-template-columns: repeat(12, 1fr);
      gap: 18px;
      margin-top: 24px;
    }

    .card {
      background: rgba(18,26,49,0.88);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .span-12 { grid-column: span 12; }
    .span-8 { grid-column: span 8; }
    .span-6 { grid-column: span 6; }
    .span-4 { grid-column: span 4; }
    .span-3 { grid-column: span 3; }

    @media (max-width: 900px) {
      .span-8, .span-6, .span-4, .span-3 { grid-column: span 12; }
      .container { padding: 18px; }
    }

    .card h2 {
      margin: 0 0 14px 0;
      font-size: 20px;
      letter-spacing: -0.02em;
    }

    .muted { color: var(--muted); }

    .meta-list {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
    }

    @media (max-width: 900px) {
      .meta-list { grid-template-columns: 1fr; }
    }

    .metric {
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 16px;
    }

    .metric .label {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .metric .value {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.03em;
    }

    .section-text {
      font-size: 15px;
      line-height: 1.8;
      color: var(--text);
      white-space: pre-wrap;
    }

    .pill-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .pill {
      padding: 10px 12px;
      border-radius: 999px;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.04);
      font-size: 14px;
      color: var(--text);
    }

    .category-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (max-width: 900px) {
      .category-grid { grid-template-columns: 1fr; }
    }

    .category-box {
      padding: 18px;
      border-radius: 18px;
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255,255,255,0.04), rgba(255,255,255,0.02));
    }

    .category-box h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .list {
      display: grid;
      gap: 10px;
    }

    .list-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      padding: 12px 14px;
      border-radius: 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--line);
    }

    .index {
      width: 28px;
      height: 28px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(110,168,254,0.18);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .asset-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 14px;
    }

    @media (max-width: 900px) {
      .asset-grid { grid-template-columns: 1fr; }
    }

    .asset-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 18px;
      background: rgba(255,255,255,0.03);
    }

    .asset-card h3 {
      margin: 0 0 10px 0;
      font-size: 16px;
    }

    .empty {
      margin-top: 24px;
      padding: 26px;
      text-align: center;
      color: var(--muted);
      border: 1px dashed var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,0.02);
    }

    footer {
      color: var(--muted);
      text-align: center;
      font-size: 13px;
      margin: 28px 0 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="eyebrow">📈 Daily Economic Intelligence</div>
      <h1>일간 경제 동향 리포트</h1>
      <div class="subtitle">
        저장된 통합 리포트 JSON을 불러와 한 페이지 대시보드 형태로 보여줍니다.
        버튼으로 JSON 파일을 업로드하거나, 같은 폴더의 기본 파일명을 직접 연결해서 사용할 수 있습니다.
      </div>
      <div class="toolbar">
        <label class="file-button" for="fileInput">📂 리포트 JSON 업로드</label>
        <input type="file" id="fileInput" accept=".json" />
        <button class="button" id="loadSampleBtn">🧪 샘플 파일 불러오기</button>
      </div>
    </section>

    <div id="app"></div>

    <footer>
      Built for the 금빅분 project · static HTML dashboard
    </footer>
  </div>

  <script>
    const app = document.getElementById('app');
    const fileInput = document.getElementById('fileInput');
    const loadSampleBtn = document.getElementById('loadSampleBtn');

    const defaultSamplePath = 'daily_reports/mk_daily_report_SAMPLE.json';

    function safe(value, fallback = '정보 없음') {
      if (value === null || value === undefined || value === '') return fallback;
      return value;
    }

    function renderList(items = [], numbered = false) {
      if (!items || !items.length) return '<div class="muted">없음</div>';
      return `
        <div class="list">
          ${items.map((item, idx) => `
            <div class="list-item">
              <div class="index">${numbered ? idx + 1 : '•'}</div>
              <div>${item}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderPills(items = []) {
      if (!items || !items.length) return '<div class="muted">없음</div>';
      return `<div class="pill-wrap">${items.map(item => `<div class="pill">${item}</div>`).join('')}</div>`;
    }

    function renderCategorySummary(categorySummary = {}) {
      const categories = ['economy', 'business', 'stocks', 'realestate', 'politics', 'international'];
      return `
        <div class="category-grid">
          ${categories.map(key => `
            <div class="category-box">
              <h3>${key}</h3>
              <div class="section-text">${safe(categorySummary[key], '주요 기사 없음')}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderAssetOutlook(assetOutlook = {}) {
      const assets = [
        ['stocks', '주식'],
        ['bonds', '채권'],
        ['deposit', '예금/금리'],
        ['realestate', '부동산'],
        ['fx', '환율']
      ];
      return `
        <div class="asset-grid">
          ${assets.map(([key, label]) => `
            <div class="asset-card">
              <h3>${label}</h3>
              <div class="section-text">${safe(assetOutlook[key], '기사 근거 부족')}</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderReport(payload) {
      const report = payload.report || payload;
      const runDate = safe(payload.run_date || report.run_date, '-');
      const model = safe(payload.report_model, '-');
      const generatedAt = safe(payload.report_generated_at, '-');
      const sourceCount = safe(payload.source_summary_count, '-');

      app.innerHTML = `
        <section class="grid">
          <div class="card span-12">
            <h2>오늘의 시장 개요</h2>
            <div class="meta-list">
              <div class="metric">
                <div class="label">기준 날짜</div>
                <div class="value">${runDate}</div>
              </div>
              <div class="metric">
                <div class="label">요약 기사 수</div>
                <div class="value">${sourceCount}</div>
              </div>
              <div class="metric">
                <div class="label">생성 모델</div>
                <div class="value">${model}</div>
              </div>
            </div>
            <div class="subtitle" style="margin-top:16px;">생성 시각: ${generatedAt}</div>
            <div class="section-text" style="margin-top:20px;">${safe(report.market_overview)}</div>
          </div>

          <div class="card span-12">
            <h2>카테고리별 정리</h2>
            ${renderCategorySummary(report.category_summary || {})}
          </div>

          <div class="card span-8">
            <h2>자산군 전망</h2>
            ${renderAssetOutlook(report.asset_outlook || {})}
          </div>

          <div class="card span-4">
            <h2>카테고리 공통 주제</h2>
            ${renderPills(report.cross_category_themes || [])}
          </div>

          <div class="card span-6">
            <h2>핵심 리스크</h2>
            ${renderList(report.top_risks || [], true)}
          </div>

          <div class="card span-6">
            <h2>정책 관전 포인트</h2>
            ${renderList(report.policy_watchpoints || [], true)}
          </div>

          <div class="card span-12">
            <h2>개인 투자자 아이디어</h2>
            ${renderList(report.investor_action_ideas || [], true)}
          </div>
        </section>
      `;
    }

    function renderEmpty(message) {
      app.innerHTML = `<div class="empty">${message}</div>`;
    }

    async function loadJsonFromFile(file) {
      try {
        const text = await file.text();
        const payload = JSON.parse(text);
        renderReport(payload);
      } catch (error) {
        renderEmpty('파일을 읽는 중 오류가 발생했습니다. JSON 형식을 확인해주세요.');
        console.error(error);
      }
    }

    async function loadJsonFromPath(path) {
      try {
        const response = await fetch(path);
        if (!response.ok) throw new Error('sample load failed');
        const payload = await response.json();
        renderReport(payload);
      } catch (error) {
        renderEmpty('샘플 파일을 불러오지 못했습니다. daily_reports 폴더 안에 샘플 JSON을 두거나 직접 업로드해주세요.');
        console.error(error);
      }
    }

    fileInput.addEventListener('change', (event) => {
      const file = event.target.files[0];
      if (file) loadJsonFromFile(file);
    });

    loadSampleBtn.addEventListener('click', () => {
      loadJsonFromPath(defaultSamplePath);
    });

    renderEmpty('먼저 통합 리포트 JSON을 업로드하세요. 또는 샘플 불러오기를 눌러보세요.');
  </script>
</body>
</html>
